name: Update publications

# Refresh data/publications.bib from OpenAlex.
# Runs weekly on Monday at 06:00 UTC and can be triggered manually from the
# Actions tab via "Run workflow".
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch publications from OpenAlex
        run: python3 scripts/fetch_pubs.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/publications.bib data/stats.json; then
            echo "publications.bib and stats.json are already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.bib data/stats.json
          git commit -m "chore: refresh publications + stats from OpenAlex"
          git push
